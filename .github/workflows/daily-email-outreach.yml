name: Daily Email Outreach

# 🚨 SCHEDULE DISABLED 2026-04-26 — Gmail account
# AbdelrahmanAbdelati20@gmail.com was suspended (SMTP error 534-5.7.14)
# after sustained cold-outreach volume. DO NOT re-enable this cron until:
#   (a) the Gmail account is recovered AND
#   (b) sending is migrated to Resend/SendGrid on outreach@closerai.org
#       with DKIM + SPF + DMARC properly configured.
# Manual workflow_dispatch is left intact so the script can still be
# triggered for testing once a healthy sender is wired up.
on:
  workflow_dispatch:
    inputs:
      batch_limit:
        description: "Number of emails to send (default: 40)"
        required: false
        default: "40"

permissions:
  contents: write # to commit back the updated blast-log.json

jobs:
  blast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install nodemailer
        run: npm install nodemailer --no-save

      - name: Run email blast
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          BATCH_LIMIT: ${{ github.event.inputs.batch_limit || '40' }}
          DELAY_MS: "20000"
        run: |
          if [ -z "$GMAIL_APP_PASSWORD" ]; then
            echo "::error::GMAIL_APP_PASSWORD secret not set. Add it in Settings → Secrets → Actions."
            exit 1
          fi
          node scripts/blast-emails-ci.js

      - name: Commit updated blast-log.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add scripts/blast-log.json
          if git diff --staged --quiet; then
            echo "No log changes to commit."
          else
            git commit -m "chore: daily blast progress [skip ci]"
            git pull --rebase origin master
            git push
          fi
