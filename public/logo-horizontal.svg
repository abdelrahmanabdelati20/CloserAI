<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160">
  <defs>
    <linearGradient id="brandGradientH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="shadowH" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Icon: rounded square with C -->
  <rect x="20" y="20" width="120" height="120" rx="28" ry="28" fill="url(#brandGradientH)" filter="url(#shadowH)"/>

  <path d="M 105 60
           Q 105 45 90 45
           L 70 45
           Q 45 45 45 80
           Q 45 115 70 115
           L 90 115
           Q 105 115 105 100"
        fill="none"
        stroke="white"
        stroke-width="14"
        stroke-linecap="round"/>

  <circle cx="108" cy="48" r="6" fill="#fbbf24"/>

  <!-- Text: "Closer" in dark, "AI" in gradient -->
  <text x="165" y="105" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="72" font-weight="800" fill="#0f172a">Closer</text>
  <text x="410" y="105" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="72" font-weight="800" fill="url(#brandGradientH)">AI</text>

  <!-- Tagline -->
  <text x="167" y="135" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="16" font-weight="500" fill="#64748b">AI-Powered Real Estate Lead Conversion</text>
</svg>
